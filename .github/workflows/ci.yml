name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: |
          if npm ls eslint --depth=0 >/dev/null 2>&1; then
            npm run lint
          else
            echo "Skipping lint: eslint is not configured in package.json"
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest --run
