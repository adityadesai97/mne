name: Supabase Types Drift Check

on:
  pull_request:
    paths:
      - supabase/migrations/**
      - supabase/sql/self_host_bootstrap.sql
      - src/lib/database.types.ts
  push:
    branches:
      - main
    paths:
      - supabase/migrations/**
      - supabase/sql/self_host_bootstrap.sql
      - src/lib/database.types.ts

jobs:
  check-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether to run
        id: guard
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Supabase secrets are not configured; skipping types drift check."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.guard.outputs.should_run == 'true'
        uses: supabase/setup-cli@v1

      - name: Generate current types from remote schema
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase gen types typescript --project-id "$SUPABASE_PROJECT_ID" > /tmp/database.types.ts

      - name: Compare generated and committed types
        if: steps.guard.outputs.should_run == 'true'
        run: diff -u /tmp/database.types.ts src/lib/database.types.ts
